
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>第五人格赛事 IVLTI 人格测试</title>
  <style>
    :root {
      --bg: #fffbea;
      --panel: #ffffff;
      --text: #2f251c;
      --muted: #7a6755;
      --line: #f0dfc2;
      --soft: #fff1d3;
      --accent: #a4774f;
      --accent-strong: #6f4324;
      --shadow: 0 16px 40px rgba(111, 67, 36, 0.10);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, #fffbea 0, #fffbea 36%, #fff1d2 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 56px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      margin-top: 20px;
      overflow: hidden;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -60px;
      top: -60px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(212, 168, 91, 0.22), rgba(212, 168, 91, 0.05));
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--accent-strong);
      border: 1px solid var(--line);
      background: var(--soft);
      border-radius: 999px;
      padding: 8px 12px;
      margin-bottom: 16px;
    }

    h1, h2, h3, p { margin: 0; }
    .hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      line-height: 1.08;
      letter-spacing: -0.03em;
      max-width: 680px;
    }
    .hero .sub {
      margin-top: 14px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.75;
      max-width: 720px;
    }
    .home-author {
      margin-top: 12px;
      color: var(--accent-strong);
      font-size: 14px;
      font-weight: 700;
      background: #fffefa;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 12px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.3fr 0.9fr;
      gap: 18px;
      align-items: stretch;
      margin-top: 24px;
    }

    .mini-panel {
      padding: 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #fffdf7, #fff0cf);
    }

    .mini-panel h3 {
      font-size: 15px;
      margin-bottom: 10px;
    }

    .mini-panel ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 14px;
    }

        .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }
    .hero-minimal {
      min-height: 48vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 42px 20px;
    }
    .hero-minimal::after { display: none; }
    .hero-minimal h1 {
      max-width: none;
      margin: 0;
    }
    .hero-actions-single {
      justify-content: center;
      margin-top: 28px;
    }

    button {
      border: 0;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, opacity .16s ease;
      font: inherit;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { cursor: not-allowed; opacity: 0.55; transform: none; }

    .btn-primary {
      background: var(--accent-strong);
      color: #fff;
      padding: 14px 20px;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(111, 67, 36, 0.20);
      font-weight: 700;
    }

    .btn-secondary {
      background: #fff;
      color: var(--accent-strong);
      padding: 14px 20px;
      border-radius: 14px;
      border: 1px solid var(--line);
      font-weight: 700;
    }



    .screen { display: none; }
    .screen.active { display: block; }

    .test-wrap,
    .result-wrap {
      margin-top: 22px;
      padding: 22px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .progress {
      flex: 1;
      min-width: 240px;
      height: 10px;
      background: #fffdf6;
      border: 1px solid #ead8b8;
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .progress > span {
      display: block;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #e5c58a, #6f4324);
      border-radius: inherit;
      transition: width .22s ease;
    }

    .progress-text {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .question-list {
      display: grid;
      gap: 16px;
    }

    .question {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(180deg, #ffffff, #fffdf6);
      transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
    }

    .question.missing {
      border-color: #d94b4b;
      background: linear-gradient(180deg, #fffafa, #fff4f4);
      box-shadow: 0 12px 30px rgba(217, 75, 75, 0.14);
    }

    .question-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      background: #ffffff;
      border: 1px solid var(--line);
    }

    .question-title {
      font-size: 16px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .question-warning {
      display: none;
      margin-top: 10px;
      color: #c93636;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.6;
    }

    .question.missing .question-warning {
      display: block;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      transition: border-color .16s ease, background .16s ease, transform .16s ease;
    }

    .option:hover {
      border-color: #ead3aa;
      background: #fffaf0;
    }

    .option input {
      margin-top: 3px;
      accent-color: var(--accent-strong);
      transform: scale(1.1);
      flex-shrink: 0;
    }

    .option-code {
      font-weight: 800;
      color: var(--accent-strong);
      min-width: 22px;
    }

    .question-nav {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .question-nav button {
      min-width: 104px;
    }
    .actions-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
      padding-top: 6px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .result-hero {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
      align-items: stretch;
    }

    .type-box,
    .score-box,
    .dim-box,
    .top3-box,
    .about-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(180deg, #ffffff, #fffdf6);
    }

    .type-kicker {
      font-size: 12px;
      color: var(--accent-strong);
      margin-bottom: 8px;
      letter-spacing: .05em;
    }

    .type-name {
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .type-subname {
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
    }

    .match {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--soft);
      border: 1px solid var(--line);
      color: var(--accent-strong);
      font-weight: 700;
    }

    .type-desc {
      margin-top: 18px;
      line-height: 1.85;
      font-size: 15px;
      color: #3b2d22;
    }

    .score-box h3,
    .dim-box h3,
    .top3-box h3,
    .about-box h3 {
      font-size: 16px;
      margin-bottom: 12px;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .score-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #fff;
    }

    .score-item .k {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .score-item .v {
      font-size: 20px;
      font-weight: 800;
      color: var(--accent-strong);
    }

    .dim-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .dim-pill {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #fff;
    }

    .dim-pill .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .dim-pill .value {
      font-size: 20px;
      font-weight: 800;
      color: var(--accent-strong);
    }

    .top3-list {
      display: grid;
      gap: 10px;
    }

    .top3-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #fff;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .top3-item strong {
      display: block;
      margin-bottom: 4px;
    }

    .top3-item span {
      color: var(--muted);
      font-size: 13px;
    }

    .top3-score {
      color: var(--accent-strong);
      font-weight: 800;
      white-space: nowrap;
    }

    .about-box p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }

    .footer-note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    
    .result-layout {
      display: grid;
      gap: 18px;
    }
    .result-top {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
      align-items: stretch;
    }
    .poster-box, .type-box, .analysis-box, .dim-box, .note-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(180deg, #ffffff, #fffdf6);
    }
        .poster-box {
      display: grid;
      grid-template-rows: 1fr auto;
      min-height: 280px;
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(circle at top right, rgba(212,168,91,0.20), rgba(212,168,91,0) 40%),
        linear-gradient(180deg, #ffffff, #fff3d8);
    }
    .poster-box::after {
      content: "";
      position: absolute;
      right: -46px;
      bottom: -46px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(212,168,91,0.16), rgba(212,168,91,0.03));
      pointer-events: none;
    }
    .poster-image {
      width: 100%;
      min-height: 220px;
      max-height: 460px;
      object-fit: contain;
      border-radius: 18px;
      background: rgba(255,255,255,0.75);
      position: relative;
      z-index: 1;
    }
    .poster-box.no-image .poster-image {
      display: none;
    }
    .poster-caption {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
      position: relative;
      z-index: 1;
    }
    .type-kicker {
      font-size: 12px;
      color: var(--accent-strong);
      margin-bottom: 8px;
      letter-spacing: .06em;
    }
    .type-name {
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }
    .type-subname {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }
    .match {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--soft);
      border: 1px solid var(--line);
      color: var(--accent-strong);
      font-weight: 700;
      font-size: 14px;
      line-height: 1.4;
    }
    .analysis-box h3, .dim-box h3, .note-box h3 {
      font-size: 16px;
      margin-bottom: 12px;
    }
    .result-actions {
      margin-top: 22px;
      display: flex;
      justify-content: flex-end;
    }
    .analysis-box p {
      margin: 0;
      color: #3b2d22;
      font-size: 15px;
      line-height: 1.9;
      white-space: pre-wrap;
    }
    .dim-list {
      display: grid;
      gap: 12px;
    }
    .dim-item {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fff;
    }
    .dim-item-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .dim-item-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }
    .dim-item-score {
      color: var(--accent-strong);
      font-weight: 800;
      font-size: 14px;
      white-space: nowrap;
    }
    .dim-item p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }
    .note-box p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }

    .author-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff, #fffdf6);
      overflow: hidden;
    }
    .author-box summary {
      list-style: none;
      cursor: pointer;
      padding: 18px;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .author-box summary::-webkit-details-marker { display: none; }
    .author-box summary::after {
      content: '展开';
      font-size: 12px;
      font-weight: 700;
      color: var(--accent-strong);
      border: 1px solid var(--line);
      background: var(--soft);
      padding: 6px 10px;
      border-radius: 999px;
      flex-shrink: 0;
    }
    .author-box[open] summary::after {
      content: '收起';
    }
    .author-content {
      border-top: 1px solid var(--line);
      padding: 0 18px 18px;
    }
    .author-content p {
      margin: 14px 0 0;
      color: #3b2d22;
      font-size: 14px;
      line-height: 1.9;
    }

    .result-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 22px;
    }
    @media (max-width: 860px) {
      .result-top { grid-template-columns: 1fr; }
    }

@media (max-width: 860px) {
      .hero-grid,
      .result-hero {
        grid-template-columns: 1fr;
      }
      .dim-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 600px) {
      .shell { padding: 14px 12px 42px; }
      .hero, .test-wrap, .result-wrap { padding: 16px; }
      .hero h1 { font-size: 32px; }
      .question-title { font-size: 15px; }
      .dim-grid,
      .score-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section id="intro" class="screen active">
      <div class="hero card hero-minimal">
        <h1>第五人格赛事 IVLTI 人格测试</h1>
        <div class="sub">测测你最像IVL里的谁</div>
        <div class="home-author">作者：月亮成瘾症</div>
        <div class="hero-actions hero-actions-single">
          <button id="startBtn" class="btn-primary">开始测试</button>
        </div>
      </div>
    </section>

    <section id="test" class="screen">
      <div class="test-wrap card">
        <div class="topbar">
          <div class="progress"><span id="progressBar"></span></div>
          <div class="progress-text" id="progressText">0 / 30</div>
        </div>

        <div id="questionList" class="question-list"></div>

        <div class="actions-bottom">
          <div class="hint" id="testHint"></div>
          <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <button id="backIntroBtn" class="btn-secondary">返回首页</button>
            <button id="submitBtn" class="btn-primary" disabled>提交并查看结果</button>
          </div>
        </div>
      </div>
    </section>

    
    <section id="result" class="screen">
      <div class="result-wrap card">
        <div class="result-layout">
          <div class="result-top">
            <div class="poster-box" id="posterBox">
              <img id="posterImage" class="poster-image" alt="人格结果图" />
              <div id="posterCaption" class="poster-caption">你的IVL人格</div>
            </div>

            <div class="type-box">
              <div class="type-kicker" id="resultModeKicker">你的主类型</div>
              <div class="type-name" id="resultTypeName">IVL人格</div>
              <div class="match" id="matchBadge">匹配度 92%</div>
              <div class="type-subname" id="resultTypeSub">系统备注会显示在这里。</div>
            </div>
          </div>

          <div class="analysis-box">
            <h3>该人格的简单解读</h3>
            <p id="resultDesc"></p>
          </div>

          <div class="dim-box">
            <h3>十维度评分</h3>
            <div id="dimList" class="dim-list"></div>
          </div>

          <div class="note-box">
            <h3>友情提示</h3>
            <p id="funNote">本测试仅供娱乐，测完你也可以去打IVL！</p>
          </div>

        </div>

        <div class="result-actions">
          <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <button id="restartBtn" class="btn-secondary">重新测试</button>
            <button id="toTopBtn" class="btn-primary">回到首页</button>
          </div>
        </div>
      </div>
    </section>

  </div>

  
  <script>
  
    // 维度元数据：定义测试的10个维度及其所属模型
	const dimensionMeta = {
	  AGG: { name: 'AGG 攻击性', model: 'IVL赛事人格模型' },
	  STL: { name: 'STL 稳定性', model: 'IVL赛事人格模型' },
	  CMD: { name: 'CMD 控场欲', model: 'IVL赛事人格模型' },
	  MEC: { name: 'MEC 操作秀感', model: 'IVL赛事人格模型' },
	  ADP: { name: 'ADP 适应力', model: 'IVL赛事人格模型' },
	  MEM: { name: 'MEM 整活度', model: 'IVL赛事人格模型' },
	  EMO: { name: 'EMO 情绪外放', model: 'IVL赛事人格模型' },
	  AUR: { name: 'AUR 舞台感', model: 'IVL赛事人格模型' },
	  BEL: { name: 'BEL 信念感', model: 'IVL赛事人格模型' },
	  TEAM:{ name: 'TEAM 个人英雄倾向', model: 'IVL赛事人格模型' }
	};
	const opts = [
	  { label: '完全不认同', value: 1 },
	  { label: '有点不认同', value: 2 },
	  { label: '中立', value: 3 },
	  { label: '有点认同', value: 4 },
	  { label: '完全认同', value: 5 }
	];
	const questions = [
	  // AGG
	  { id:'q1', dim:'AGG', text:'在一段关系里，我经常是偏强势的一方。', options:opts },
	  { id:'q2', dim:'AGG', text:'我倾向于主动出击，而不是等机会出现。', options:opts },
	  { id:'q3', dim:'AGG', text:'面对挑衅时，比起忍耐，我更想直接反击。', options:opts },

	  // STL
	  { id:'q4', dim:'STL', text:'在游戏对局中，我不太容易红温。', options:opts },
	  { id:'q5', dim:'STL', text:'别人通常觉得我很靠谱。', options:opts },
	  { id:'q6', dim:'STL', text:'在对局中，需要抗压时，我能够站出来。', options:opts },

	  // CMD

		M: "你有一定舞台感，能在关键时刻被看见。你不是每局都站在聚光灯下，但当你打出关键牵制、关键追击或关键决策时，存在感会突然变强。你属于有高光潜力但不刻意营业的类型。",

	  BEL: {

		M: "你有自己的坚持，但不会完全听不进意见。你能在质疑和自信之间来回调整，既不会轻易放弃目标，也不至于一路撞墙。你适合在有人交流和复盘的环境里持续变强。",
		H: "你的信念感很强，认定的东西很难被轻易动摇。关键分、逆风局、外界压力都不一定能把你打散。你很适合扛旗和撑场面，但也要小心太相信自己，导致明明该变招却硬走到底。"
	  },
	  TEAM: {
		L: "你更相信团队协作，愿意把自己放进整体节奏里。你不执着于一个人解决所有问题，更看重配合、补位、信息和资源交换。你可能不是最爱出风头的人，但很适合成为团队稳定运转的一部分。",
		M: "你能在个人发挥和团队配合之间切换。需要你站出来时，你愿意承担；需要你服务团队时，也能接受安排。你的风格比较弹性，不会过分独，也不会完全失去个人判断。",
		H: "你关键时刻很想靠自己改写局势。越是压力大的地方，你越容易产生我来的想法。你可能打出非常漂亮的个人破局，也可能因为太想拯救比赛而吃到反噬。你是典型的高风险高存在感类型。"
	  }
	};
    // 维度顺序：定义计算结果时的维度顺序
	const dimensionOrder = [
	  'AGG','STL','CMD','MEC','ADP',
	  'MEM','EMO','AUR','BEL','TEAM'
	];
    // 应用状态：存储测试相关的状态
    const app = {
      shuffledQuestions: [],  // 打乱后的问题列表
      answers: {},           // 用户回答
      currentQuestionIndex: 0, // 当前题目页码
      missingQuestionId: null, // 当前提示的漏选题
      previewMode: false     // 是否预览模式
    };

    // 屏幕元素：存储页面上的三个主要屏幕
    const screens = {
      intro: document.getElementById('intro'),  // 首页屏幕
      test: document.getElementById('test'),    // 测试屏幕
      result: document.getElementById('result') // 结果屏幕
    };

    // DOM元素：存储页面上的关键元素
    const questionList = document.getElementById('questionList');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const submitBtn = document.getElementById('submitBtn');
    const testHint = document.getElementById('testHint');

    // 显示指定屏幕
    function showScreen(name) {
      Object.entries(screens).forEach(([key, el]) => {
        el.classList.toggle('active', key === name);
      });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 打乱数组顺序
    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // 获取可见的问题列表
    function getVisibleQuestions() {
      const visible = [...app.shuffledQuestions];
      return visible;
    }


    // 渲染当前题目页
    function renderQuestions() {
      const visibleQuestions = getVisibleQuestions();
      const total = visibleQuestions.length;
      if (total === 0) {
        questionList.innerHTML = '';
        updateProgress();
        return;
      }

      app.currentQuestionIndex = Math.min(Math.max(app.currentQuestionIndex, 0), total - 1);
      const q = visibleQuestions[app.currentQuestionIndex];
      const hasAnswer = app.answers[q.id] !== undefined;
      const card = document.createElement('article');
      card.className = app.missingQuestionId === q.id ? 'question missing' : 'question';
      card.dataset.questionId = q.id;
      card.innerHTML = `
        <div class="question-meta">
          <div class="badge">第 ${app.currentQuestionIndex + 1} / ${total} 题</div>
        </div>
        <div class="question-title">${q.text}</div>
        <div class="question-warning">这道题还没有选择，请先选一个答案。</div>
        <div class="options">
          ${q.options.map((opt, i) => {
            const code = ['A', 'B', 'C', 'D', 'E'][i] || String(i + 1);
            const checked = app.answers[q.id] === opt.value ? 'checked' : '';
            return `
              <label class="option">
                <input type="radio" name="${q.id}" value="${opt.value}" ${checked} />
                <div class="option-code">${code}</div>
                <div>${opt.label}</div>
              </label>
            `;
          }).join('')}
        </div>
        <div class="question-nav">
          <button type="button" class="btn-secondary" data-page-action="prev" ${app.currentQuestionIndex === 0 ? 'disabled' : ''}>上一题</button>
          <button type="button" class="btn-secondary" data-page-action="next" ${(!hasAnswer || app.currentQuestionIndex === total - 1) ? 'disabled' : ''}>下一题</button>
        </div>
      `;

      questionList.innerHTML = '';
      questionList.appendChild(card);

      questionList.querySelectorAll('input[type="radio"]').forEach(input => {
        input.addEventListener('change', (e) => {
          const { name, value } = e.target;
          app.answers[name] = Number(value);
          app.missingQuestionId = null;
          const currentCard = e.target.closest('.question');
          if (currentCard) currentCard.classList.remove('missing');
          renderQuestions();
        });
      });

      questionList.querySelectorAll('[data-page-action]').forEach(button => {
        button.addEventListener('click', (e) => {
          const action = e.currentTarget.dataset.pageAction;
          app.currentQuestionIndex += action === 'prev' ? -1 : 1;
          app.missingQuestionId = null;
          renderQuestions();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      });

      updateProgress();
    }
    // 更新进度条
    function updateProgress() {
      const visibleQuestions = getVisibleQuestions();
      const total = visibleQuestions.length;
      const done = visibleQuestions.filter(q => app.answers[q.id] !== undefined).length;
      const percent = total ? (done / total) * 100 : 0;
      progressBar.style.width = `${percent}%`;
      progressText.textContent = `${done} / ${total}`;
      const complete = done === total && total > 0;
      submitBtn.disabled = total === 0 || app.currentQuestionIndex !== total - 1;
      testHint.textContent = '';
    }

    function validateAnswers() {
      const visibleQuestions = getVisibleQuestions();
      const missingQuestions = visibleQuestions.filter(q => app.answers[q.id] === undefined);

      if (missingQuestions.length === 0) return true;

      const firstMissing = missingQuestions[0];
      const firstMissingIndex = visibleQuestions.findIndex(q => q.id === firstMissing.id);
      app.currentQuestionIndex = firstMissingIndex >= 0 ? firstMissingIndex : 0;
      app.missingQuestionId = firstMissing.id;
      renderQuestions();
      testHint.textContent = '';
      return false;
    }
    // 将分数转换为等级（L/M/H）
    function sumToLevel(score, maxScore) {
      const thirdScore = maxScore / 3;
      const twoThirdsScore = maxScore * 2 / 3;
      if (score < thirdScore) return 'L';
      if (score < twoThirdsScore) return 'M';
      return 'H';
    }

    // 计算测试结果
    function computeResult() {
      const rawScores = {};
      const levels = {};
      const dimQuestionCount = {};
      // 初始化每个维度的分数和问题数为0
      Object.keys(dimensionMeta).forEach(dim => { 
        rawScores[dim] = 0;
        dimQuestionCount[dim] = 0;
      });

      // 计算每个维度的总分和问题数
      questions.forEach(q => {
        rawScores[q.dim] += Number(app.answers[q.id] || 0);
        dimQuestionCount[q.dim]++;
      });

      // 将每个维度的分数转换为等级
      Object.entries(rawScores).forEach(([dim, score]) => {
        const maxScore = dimQuestionCount[dim] * 5; // 每个问题满分5分
        levels[dim] = sumToLevel(score, maxScore);
      });

      // 计算用户向量和每个角色的相似度（使用原始分数）
      const userVector = dimensionOrder.map(dim => rawScores[dim]);
      const ranked = NORMAL_TYPES.map(type => {
        const vector = type.vector;
        
        let distance = 0;
        let totalPossibleDistance = 0;
        for (let i = 0; i < vector.length; i++) {
          const diff = Math.abs(userVector[i] - vector[i]);
          distance += diff;
          totalPossibleDistance += 12; // 每个维度最大可能差异为12
        }
        const similarity = Math.max(0, Math.round((1 - distance / totalPossibleDistance) * 100));
        return { ...type, ...TYPE_LIBRARY[type.code], distance, similarity };
      }).sort((a, b) => {
        if (a.similarity !== b.similarity) return b.similarity - a.similarity;
        return a.distance - b.distance;
      });

      const bestNormal = ranked[0];
      let finalType;
      let modeKicker = '你的IVL赛事人格';
      let badge = `匹配度 ${bestNormal.similarity}%`;
      let sub = '维度命中度较高，你非常像这位角色！';
      let special = false;
      let secondaryType = null;

      finalType = bestNormal;

      return {
        rawScores,
        levels,
        ranked,
        bestNormal,
        finalType,
        modeKicker,
        badge,
        sub,
        special,
        secondaryType
      };
    }

    // 渲染维度列表
    function renderDimList(result) {
      const dimList = document.getElementById('dimList');
      dimList.innerHTML = dimensionOrder.map(dim => {
        const level = result.levels[dim];
        const score = result.rawScores[dim];
        const dimName = dimensionMeta[dim].name;
        const explanation = DIM_EXPLANATIONS[dim][level];
        
        return `
          <div class="dim-item">
            <div class="dim-item-top">
              <div class="dim-item-name">${dimName}</div>
              <div class="dim-item-score">${level} / ${score}分</div>
            </div>
            <p>${explanation}</p>
          </div>
        `;
      }).join('');
    }

    // 渲染结果页面
    function renderResult() {
      if (!validateAnswers()) return;

      const result = computeResult();
      const type = result.finalType;

      // 更新结果页面的内容
      document.getElementById('resultModeKicker').textContent = result.modeKicker;
      document.getElementById('resultTypeName').textContent = type.code;
      document.getElementById('matchBadge').textContent = result.badge;
      document.getElementById('resultTypeSub').textContent = result.sub;
      document.getElementById('resultDesc').textContent = type.desc;
      document.getElementById('posterCaption').textContent = type.intro;
      document.getElementById('funNote').textContent = '本测试仅供娱乐，角色定义并不全面，请勿过度较真。';

      // 处理角色图片
      const posterBox = document.getElementById('posterBox');
      const posterImage = document.getElementById('posterImage');
      const imageSrc = TYPE_IMAGES[type.code];
      if (imageSrc) {
        posterImage.src = imageSrc;
        posterImage.alt = `${type.code}（${type.cn}）`;
        posterBox.classList.remove('no-image');
      } else {
        posterImage.removeAttribute('src');
        posterImage.alt = '';
        posterBox.classList.add('no-image');
      }

      // 渲染维度列表并显示结果屏幕
      renderDimList(result);
      showScreen('result');
    }

    // 开始测试
    function startTest(preview = false) {
      app.previewMode = preview;
      app.answers = {};
      app.currentQuestionIndex = 0;
      app.missingQuestionId = null;
      const shuffledRegular = shuffle(questions);
      app.shuffledQuestions = shuffledRegular;
      renderQuestions();
      showScreen('test');
    }



    // 事件监听器：绑定按钮点击事件
    document.getElementById('startBtn').addEventListener('click', () => startTest(false));
    document.getElementById('backIntroBtn').addEventListener('click', () => showScreen('intro'));
    document.getElementById('submitBtn').addEventListener('click', renderResult);
    document.getElementById('restartBtn').addEventListener('click', () => startTest(false));
    document.getElementById('toTopBtn').addEventListener('click', () => showScreen('intro'));
  </script>

</body>
</html>
